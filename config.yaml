# 并发控制配置
concurrency:
  max_total_concurrent: 1  # 所有实例允许的最大并发数
  lock_file_path: "logs/concurrency_lock.json"  # 锁文件路径
  acquire_timeout: 5  # 获取锁的超时时间（秒）
  instance_heartbeat_interval: 60  # 实例心跳间隔（秒）
  stale_instance_timeout: 300  # 实例超时时间（秒）
